name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Restore dependencies
        run: dotnet restore SpaceRadar.sln

      - name: Build
        run: dotnet build SpaceRadar.sln --no-restore --configuration Release

      - name: Publish SpaceRadar (WPF)
        run: dotnet publish SpaceRadar/SpaceRadar.csproj --no-restore --configuration Release --runtime win-x64 --self-contained true -o publish/SpaceRadar

      - name: Create Release Archive
        run: Compress-Archive -Path publish/SpaceRadar/* -DestinationPath SpaceRadar-${{ github.ref_name }}-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: SpaceRadar-${{ github.ref_name }}-win-x64.zip
          generate_release_notes: true
